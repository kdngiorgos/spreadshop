<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1f5f9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bg)" rx="4"/>
  <g transform="translate(100,100)" opacity="0.35">
    <!-- Box outline -->
    <path d="M-30,-35 L30,-35 L45,0 L45,30 L-45,30 L-45,0 Z" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round"/>
    <!-- Box top flap -->
    <path d="M-30,-35 L0,-50 L30,-35" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linejoin="round"/>
    <!-- Box divider -->
    <line x1="-45" y1="0" x2="45" y2="0" stroke="#94a3b8" stroke-width="2" opacity="0.6"/>
    <!-- Center cross -->
    <line x1="0" y1="-35" x2="0" y2="30" stroke="#94a3b8" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
